<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
     <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@100..800&display=swap" rel="stylesheet">
     <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Playpen+Sans+Hebrew:wght@100..800&display=swap" rel="stylesheet">
   <style>
     html, body {
       direction: rtl;
       margin: 0;
       padding: 0;
       overflow: auto;
     }
     
     #intro {
       position: fixed;
       display: flex;
       inset: 0;
       justify-content: center;
       align-items: center;
       transform: translateY(-80vh) translateX(0vw);
       background: transparent;
       opacity: 0;
       transition: opacity 2s, transform 2s;
       pointer-events: auto;
       z-index: 5;
     }
     
     #intro.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #intro.unshow {
       transform: translateX(100vw);
      }

     #intro:hover {
       background: transparent;
       cursor: pointer;
     }

     #intro2 {
      position: fixed;
      display: flex;
      inset: 0;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transform: translateX(-100vh);
      background: transparent;
      background-image: url("assets/images/intro2.jpg");
      opacity: 0;
      pointer-events: none;
      cursor: pointer;
      transition: opacity 1s, transform 0.65s;
      z-index: 20;
     }

     #intro2.show {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
     }

     #intro2:hover {
        cursor: pointer;
     }

     #intro2.unshow {
       opacity: 0;
       transform: translateX(100vw);
       pointer-events: none;
      }

     #allcatalog {
      position: absolute;
      display: flex;
      inset: 0;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 4.5s;
      z-index: 2;
     }

     #allcatalog.show {
      opacity: 1;
      pointer-events: auto;
     }

     #privet {
      position: fixed;
      display: flex;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-40vh);
      opacity: 0;
      transition: opacity 4.5s, transform 4.5s;
      z-index: 3;
      color: white;
      text-shadow: 2px 2px 4px black;
     }

     #privet.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #privet.unshow {
       opacity: 0;
       transform: translateY(-40vh);
     }

     #photointro {
      position: relative;
      display: flex;
      height: 40vh;
      width: 40vw;
      background-image: url("assets/images/photointro.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 4;
     }

     #back1 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon5.png");
      transition: transform 0.65s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(0);
      opacity: 1;
     }

     #back1.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #back1.unshow {
       opacity: 1;
       transform: translateY(100vh);
     }

     #back2 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon4.png");
      transition: transform 0.65s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-100vh);
      opacity: 1;
     }

     #back2.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #back2.unshow {
       opacity: 1;
       transform: translateY(100vh);
     }

     #back3 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon3.png");
      transition: transform 0.65s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-100vh);
      opacity: 1;
     }

     #back3.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #back3.unshow {
       opacity: 1;
       transform: translateY(100vh);
     }

     #back4 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon2.png");
      transition: transform 0.65s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-100vh);
      opacity: 1;
     }

     #back4.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #back4.unshow {
       opacity: 1;
       transform: translateY(100vh);
     }

     #back5 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon1.png");
      transition: transform 0.65s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-100vh) translateX(0vw);
      opacity: 1;
     }

     #back5.show {
       opacity: 1;
       transform: translateY(0vh) translateX(0vw);
     }

     #back5.unshow {
       opacity: 1;
       transform: translateX(100vw);
     }
     
     #back6 {
      position: absolute;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      z-index: 3;
      background-image: url("assets/images/fon1.png");
      transition: transform 1s, opacity 1s;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-100vh);
      opacity: 1;
     }

     #back6.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #back6.unshow {
       opacity: 0;
       transform: translateY(100vh);
     }

     h1 {
      font-size: 10vh;
      font-family: "Heebo", sans-serif;
     }
     h2 {
      font-size: 6vh;
      font-family: "Playpen Sans Hebrew", cursive;
     }

     #menu {
      position: absolute;
      display: flex;
      align-self: flex-start;
      gap: 2vw;
      height: 6vh;
      width: 100vw;
      background-color: rgb(0, 0, 0);
      align-items: center;
      justify-content: right;
      opacity: 0;
      transition: opacity 2s;
      z-index: 6;
     }

     #menu.show {
       opacity: 0.5;
     }

     #btnmenu {
      position: fixed;
      height: 4vh;
      width: 4vh;
      display: flex;
      flex-direction: column;
      transform: translateX(-1vw);
      justify-content: space-between;
      padding: 8px;
      background-color: rgb(75, 75, 75);
      cursor: pointer;
      z-index: 6;
      pointer-events: none;
     }

     #btnmenu:hover {
      background-color: rgb(55, 55, 55);
     }

     #btnmenu span {
      display: block;
      height: 3px;
      width: 100%;
      background: black;
     }

     #catalog {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      inset: 0;
      justify-content: center;
      align-items: center;
      transform: translateY(-40vh);
      opacity: 0;
      transition: opacity 1.5s, transform 2.5s;
      z-index: 3;
      color: white;
      text-shadow: 2px 2px 5px black;
      direction: ltr;
     }

     #catalogfon {
      position: fixed;
      display: flex;
      inset: 0;
      opacity: 0;
      background-image: url("assets/images/fon.jpg");
      transition: opacity 1.5s;
     }

     #catalog.show {
       opacity: 1;
       transform: translateY(0vh);
     }

     #catalogfon.show {
       opacity: 1;
     }

     .opisanie {
      direction: rtl;
      position: relative;
      display: flex;
      bottom: 0;
      font-size: 2vh;
     }
     
     .tovar {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      flex-direction: column;
      width: calc(33.33% - 20px);
      transform: translateY(10vh);
      justify-content: center;
      align-items: center;
     }
     

     .photo {
       width: 40%;
       height: 60%;
       object-fit: contain;
      }

      .photo:hover {
       transform: op;
      }

      #menulist {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 25vw;
        z-index: 5;
        transform: translateX(-120%);
        transition: transform 0.9s;
        background-color: rgb(255, 255, 255);
        opacity: 0.90;
      }

      #menufon {
       position: fixed;
       width: 100vw;
       height: 100vh;
       opacity: 0;
       z-index: 4;
       opacity: 0.85;
       transform: translate(-100%);
       background-color: black;
      }

      #menufon.open {
        transform: translateX(0);
      }

      #menulist.open {
        transform: translateX(0);
      }

      #catigoria, #catigoria2 {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 2vh;
        right: 2vw;
        opacity: 0;
        transform: translateY(-30%);
        transition: transform 1.2s, opacity 1.2s;
        pointer-events: none;
      }

      #catigoria.show {
        transform: translateY(0%);
        opacity: 1;
        pointer-events: auto;
       }

       #catigoria2.show {
        transform: translateY(20%);
        opacity: 1;
        pointer-events: auto;
       }

      .btncat1 {
        height: 3vh;
        width: 8vw;
        background-color: rgba(145, 145, 145, 0.336);
      }

      .btncat2 {
        height: 3vh;
        width: 8vw;
        background-color: rgba(145, 145, 145, 0.336);
      }

      .btncat1:hover, .btncat2:hover {
        background-color: rgba(66, 66, 66, 0.651);
      }

      .btncat1:active, .btncat2:active {
        background-color: rgba(58, 58, 58, 0.808);
        transform: scale(1.15);
      }

      .btncat1.nazal, .btncat2.nazal {
        background-color: rgba(22, 22, 22, 0.808);
        transform: scale(1.1);
      }

      .cat {
        position: relative;
       display: flex;
       right: 2vh;
       font-size: 4vh;
       height: 6vh;
       width: 40%;
       cursor: pointer;
       color: rgb(136, 138, 126);
      }

      .cat:hover {
       color: rgb(52, 53, 47);
      }

      #cats {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
   </style>

  </head>
<body>
<div id="intro">
  <div id="photointro"></div>
</div>

<div id="back1"></div>
<div id="back2"></div>
<div id="back3"></div>
<div id="back4"></div>
<div id="back5"></div>

<div id="intro2">
  <h1>דיגיטר מציג: </h1>
  <h2>קטלוג!</h2>
</div>

<h1 id="privet">שלום</h1>

<div id="catalogfon"></div>

<div id="menu"> 
    <button id="btnmenu">
      <span></span>
      <span></span>
      <span></span>
    </button>
</div>

<div id="menulist">
  <h1 id="cats">קטלוג</h1>
  <h2 class="cat" id="cat2">עונות</h2>
  <div id="catigoria">
    <button onclick="toggleseason('summer'); knopoc(this)" id="summer" class="btncat1">קיץ</button>
    <button onclick="toggleseason('fall'); knopoc(this)" id="fall" class="btncat1">סתיו</button>
    <button onclick="toggleseason('winter'); knopoc(this)" id="winter" class="btncat1">חורף</button>
    <button onclick="toggleseason('spring'); knopoc(this)" id="spring" class="btncat1">אביב</button>
  </div>
  <h2 class="cat" id="cat1">סוג מוצר</h2>
  <div id="catigoria2">
    <button onclick="toggletype('clothes'); knopoc2(this)" id="clothes" class="btncat2">בגדים</button>
    <button onclick="toggletype('mugs'); knopoc2(this)" id="mugs" class="btncat2">ספלים</button>
    <button onclick="toggletype('keys'); knopoc2(this)" id="keys" class="btncat2">מחזיקי מפתחות </button>
    <button onclick="toggletype('rug'); knopoc2(this)" id="rug" class="btncat2">פד לעכבר</button>
  </div>
</div>
<div id="menufon"></div>

<div id="allcatalog">
  <div id="catalog">

   <div id="r1" class="tovar" data-season="winter" data-type="keys">
    <img class="photo" src="assets/images/tovar1.jpeg">
    <p class="opisanie">зима-ключ</p>
   </div>

    <div id="r2" class="tovar" data-season="winter" data-type="mugs">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">зима-кружка</p>
    </div>

    <div id="r3" class="tovar" data-season="winter" data-type="clothes">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">зима-одежда</p>
    </div>

    <div id="r4" class="tovar" data-season="summer" data-type="mugs">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">лето-кружка</p>
    </div>

    <div id="r5" class="tovar" data-season="summer" data-type="keys">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">лето-ключ</p>
    </div>

    <div id="r6" class="tovar" data-season="summer" data-type="keys">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">лето-ключ</p>
    </div>

    <div id="r7" class="tovar" data-season="fall" data-type="rug">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">осень-коврик</p>
    </div>

    <div id="r8" class="tovar" data-season="fall" data-type="mugs">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">осень-кружка</p>
    </div>

    <div id="r9" class="tovar" data-season="spring" data-type="keys">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">весна-ключ</p>
    </div>

    <div id="r10" class="tovar" data-season="spring" data-type="clothes">
     <img class="photo" src="assets/images/tovar1.jpeg">
     <p class="opisanie">весна-одежда</p>
   </div>

  </div>
</div>

</body>
<script>
 const intro = document.getElementById("intro");
 const intro2 = document.getElementById("intro2");
 const allcatalog = document.getElementById("allcatalog");
 const privet = document.getElementById("privet");
 const catalog = document.getElementById("catalog");
 const photointro = document.getElementById("photointro");
 const back1 = document.getElementById("back1");
 const back2 = document.getElementById("back2");
 const back3 = document.getElementById("back3");
 const back4 = document.getElementById("back4");
 const back5 = document.getElementById("back5");
 const catalogfon = document.getElementById("catalogfon");
 const menu = document.getElementById("menu");
 const btnmenu = document.getElementById("btnmenu");
 const menulist = document.getElementById("menulist");
 const menufon = document.getElementById("menufon");
 const catigoria = document.getElementById("catigoria");
 const catigoria2 = document.getElementById("catigoria2");
 const summer = document.getElementById("summer");
 const fall = document.getElementById("fall");
 const winter = document.getElementById("winter");
 const spring = document.getElementById("spring");
 const clothes = document.getElementById("clothes");
 const mugs = document.getElementById("mugs");
 const keys = document.getElementById("keys");
 const rug = document.getElementById("rug");
 const cat2 = document.getElementById("cat1");
 const cat1 = document.getElementById("cat2");
 const tovar = document.getElementsByClassName("tovar");
 const seasons = document.querySelectorAll(".tovar");
 const btncat1 = document.querySelectorAll(".btncat1");
 const btncat2 = document.querySelectorAll(".btncat2");

  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
     document.querySelector("html").style.overflow = "hidden";
     document.querySelector("body").style.overflow = "hidden";
     intro.style.pointerEvents = "none";
     intro.classList.add("show");
     back1.classList.add("show");
      setTimeout(() => {
       back2.classList.add("show");
       back1.classList.add("unshow");
        setTimeout(() => {
         back1.style.display = "none";
         back3.classList.add("show");
         back2.classList.add("unshow");
          setTimeout(() => {
           back2.style.display = "none";
           back4.classList.add("show");
           back3.classList.add("unshow");
            setTimeout(() => {
            back3.style.display = "none";
             back5.classList.add("show");
             back4.classList.add("unshow");
              setTimeout(() => {
                back4.style.display = "none";
                intro.style.pointerEvents = "auto";
              }, 600)
            }, 600);
          }, 600);
        }, 600);
      }, 600);
    }, 50);
  });

  intro.addEventListener("click", function () {
   intro.style.transition = "transform 1.0s";
   intro.classList.add("unshow");
   back5.classList.add("unshow");
   intro2.classList.add("show");
   setTimeout (() => {
     back5.style.display = "none";
    }, 2000)
  })

  intro2.addEventListener("click", function () {
   intro2.classList.add("unshow");
   setTimeout(() => {
     catalogfon.classList.add("show");
     privet.classList.add("show");
     allcatalog.classList.add("show");
    }, 150);
   setTimeout(() => {
     privet.classList.remove("show");
     privet.classList.add("unshow");
     catalog.classList.add("show");
     menu.classList.add("show");
     btnmenu.style.pointerEvents = "auto";
     document.querySelector("html").style.overflowY = "auto";
     document.querySelector("body").style.overflowY = "auto";
     document.querySelector("html").style.overflowX = "hidden";
     document.querySelector("body").style.overflowX = "hidden";
    }, 2500);
  })

  btnmenu.addEventListener("click", function () {
   menufon.classList.toggle("open");
   menulist.classList.toggle("open"); 
  })

  menufon.addEventListener("click", function () {
    menufon.classList.remove("open");
    menulist.classList.remove("open");
  })


  cat1.addEventListener("click", function () {
   catigoria.classList.toggle("show");
  })

  cat2.addEventListener("click", function () {
   catigoria2.classList.toggle("show");
  })

  const category = {
   summer: false,
   fall: false,
   winter: false,
   spring: false
  };

  const category2 = {
   clothes: false,
   mugs: false,
   keys: false,
   rug: false
  };

  function toggleseason(season){
   if(Object.values(category).filter(value => value === true).length === 1 && category[season] === false) {
     category.fall = false;
     category.spring = false;
     category.summer = false;
      category.winter = false;
    }
      
   if(category[season] === false) {
     category[season] = true;
    console.log(category);
    } else {
     category[season] = false;
     console.log(category);
    }
      
   seasons.forEach(item => {
     if(item.dataset.season === season){
       item.style.display = "flex";
      } else {
       item.style.display = "none";
      }

     if(Object.values(category).every(value => value === false)) {
       item.style.display = "flex";
      }
    });
  }

  function knopoc(knopca){
   if(knopca.classList.contains("nazal")){
     knopca.classList.remove("nazal")
    } else {
     summer.classList.remove("nazal")
     spring.classList.remove("nazal")
     winter.classList.remove("nazal")
     fall.classList.remove("nazal")
     knopca.classList.toggle("nazal")
    }
  }

  function knopoc2(knopca){
   if(knopca.classList.contains("nazal")){
     knopca.classList.remove("nazal")
    } else {
     clothes.classList.remove("nazal")
     mugs.classList.remove("nazal")
     keys.classList.remove("nazal")
     rug.classList.remove("nazal")
     knopca.classList.toggle("nazal")
    }
  }

  function toggletype(type){
   if(Object.values(category2).filter(value => value === true).length === 1 && category2[type] === false) {
     category2.clothes = false;
     category2.mugs = false;
     category2.keys = false;
     category2.rug = false;
    }
      
   if(category2[type] === false) {
     category2[type] = true;
    console.log(category2);
    } else {
     category2[type] = false;
     console.log(category2);
    }
      
   seasons.forEach(item => {
     if(item.dataset.type === type){
       item.style.display = "flex";
      } else {
       item.style.display = "none";
      }

     if(Object.values(category2).every(value => value === false)) {
       item.style.display = "flex";
      }
    });
  }

</script>
</html>
